name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: windows-latest # Windows runner works perfectly for building and publishing .NET apps

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore NuGet Packages
        run: dotnet restore KhoHang/KhoHang.csproj

      - name: Build Application
        run: dotnet build KhoHang/KhoHang.csproj --configuration Release --no-restore

      - name: Publish Application
        run: dotnet publish KhoHang/KhoHang.csproj -c Release -o ${{ github.workspace }}/publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'KhoHang' # Tên Web App của bạn trên Azure
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish
